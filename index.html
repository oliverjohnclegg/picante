<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Picante</title>
    <link rel="stylesheet" href="/src/styles/base.css" />
    <link rel="stylesheet" href="/src/styles/layout.css" />
  </head>
  <body>
    <main class="app-shell">
      <section id="setup-screen" class="screen">
        <div class="panel hero">
          <h1>Picante</h1>
          <p class="subtitle">One screen. High chaos. Host-controlled penalties.</p>
        </div>
        <div class="panel">
          <div class="setup-row">
            <label for="player-count">Players</label>
            <select id="player-count"></select>
            <button id="generate-players" type="button">Generate</button>
          </div>
          <div id="players-config" class="players-config"></div>
          <button id="start-game" type="button" class="action">Start Game</button>
        </div>
      </section>

      <section id="game-screen" class="screen hidden">
        <div class="topbar panel">
          <div id="deck-meta"></div>
          <div id="turn-meta"></div>
          <button id="new-game" type="button">New Game</button>
        </div>

        <div class="layout">
          <section class="panel scoreboard-panel">
            <h2>Players</h2>
            <div id="scoreboard" class="scoreboard"></div>
          </section>

          <section class="panel turn-panel">
            <h2 id="turn-title">Turn</h2>
            <button id="draw-card" type="button" class="action">Draw Card</button>
            <div id="card-view" class="card-view"></div>
            <div id="forfeit-view" class="forfeit-view"></div>
            <div id="penalty-controls" class="penalty-controls"></div>
            <div class="turn-actions">
              <button id="randomize-penalties" type="button">Random Suggestion</button>
              <button id="reset-penalties" type="button">Reset Turn Penalties</button>
              <button id="end-turn" type="button" class="action">End Turn</button>
            </div>
          </section>

          <section class="panel log-panel">
            <h2>Game Feed</h2>
            <div id="event-log" class="event-log"></div>
          </section>
        </div>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
