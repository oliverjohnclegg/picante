<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Picante</title>
    <link rel="stylesheet" href="/src/styles/base.css" />
    <link rel="stylesheet" href="/src/styles/layout.css" />
  </head>
  <body>
    <main class="app-shell">
      <section id="setup-screen" class="screen">
        <div class="panel hero">
          <h1>Picante</h1>
          <p class="subtitle">Set up your players and jump in.</p>
        </div>
        <div class="panel setup-panel">
          <div class="setup-header">
            <h2>Players</h2>
            <select id="player-count"></select>
          </div>
          <div id="players-config" class="players-config"></div>
          <button id="start-game" type="button" class="action">Start Game</button>
        </div>
      </section>

      <section id="game-screen" class="screen hidden">
        <div class="topbar panel">
          <div class="topbar-left">
            <span id="turn-meta"></span>
            <span id="deck-meta" class="muted"></span>
          </div>
          <button id="new-game" type="button">New Game</button>
        </div>

        <div class="layout">
          <section class="panel scoreboard-panel">
            <h2>Players</h2>
            <div id="scoreboard" class="scoreboard"></div>
          </section>

          <section class="panel turn-panel">
            <button id="draw-card" type="button" class="action">Draw Card</button>
            <div id="card-view" class="card-view"></div>
            <div id="forfeit-view" class="forfeit-view"></div>
          </section>

          <section class="panel penalty-panel">
            <div id="penalty-controls" class="penalty-controls"></div>
            <div class="turn-actions">
              <button id="randomize-penalties" type="button">Random</button>
              <button id="reset-penalties" type="button">Reset</button>
              <button id="end-turn" type="button" class="action">End Turn</button>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
